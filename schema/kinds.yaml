# Node kinds. Started at six; jtbd and component were added DURING the first
# decant because the graph demanded them (serves needs a root; vision stubs
# need a home); initiative and lesson followed in installment two, insight and
# plan in installment three, for the same reason. That pressure-testing is the
# intended way this file grows.
kinds:
  jtbd:          {note: "a user need; root of all serves traceability", serves_required: false}
  glossary-term: {note: "canonical definition of a term used by other nodes", serves_required: false}
  domain-entity: {note: "a thing in the domain: attributes, identity, lifecycle, invariants", serves_required: false}
  contract:      {note: "behavioral interface promise: pre/post/invariants/errors", serves_required: true}
  decision:      {note: "a settled choice with rationale and provenance (ADR-equivalent)", serves_required: false}
  work-item:     {note: "endeavor: a unit of work to do, not a part of the system", serves_required: true}
  way-of-working: {note: "the operating agreement under which work happens; versioned, pinned", serves_required: false}
  component:     {note: "a part of the system being built", serves_required: true}
  initiative:    {note: "a long-horizon endeavor grouping work toward a major outcome", serves_required: true}
  lesson:        {note: "a process lesson earned from a real incident; must cite its provenance", serves_required: false}
  insight:       {note: "a framing or diagnosis that shapes decisions; cited as rationale", serves_required: false}
  plan:          {note: "an ordered, re-prioritizable sequence of intended work referencing graph nodes", serves_required: true}
