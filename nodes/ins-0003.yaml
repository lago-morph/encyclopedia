id: ins-0003
kind: insight
title: The system metabolizes uncertainty at a controlled rate
intent: The purpose of all this structure is to protect the discovery loop - people do not know what they
  want until they use it - not to replace it. Discovery stays cheap to act on because blast radius is
  computable and re-freezing is mechanical.
