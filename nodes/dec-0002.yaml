id: dec-0002
kind: decision
title: Structure maximalism, prose minimalism
intent: 'Rich methodology is welcome - typed nodes, edges, ladders, state cards - provided every element
  is machine-checkable, computable, or refusable. Described-but-unenforced structure is the documented
  disease (software-factory v4: 3.2MB of prose specs, nothing runnable).'
maturity: L0
status: adopted
provenance: Synthesis session 2026-06-10, reconciling forensics law with methodology-first preference.
