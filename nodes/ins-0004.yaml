title: 'The recursive trap: structure generation feels like progress'
intent: 'Agents produce structure at zero marginal cost, every failure gets metabolized into more process
  artifacts, and the corpus buries its author. Agents are a methodologist''s amplifier hazard: they will
  generate unlimited methodology on request, each piece locally reasonable.'
